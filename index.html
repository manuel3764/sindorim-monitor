<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>신도림 2호선 열차 모니터</title>
<style>
  body{
    --bg:#15161a; --surface:#1e2025; --surface2:#26282e;
    --text:#e8e8ea; --muted:#9a9ba0; --hint:#6b6c72;
    --line:#34363d; --info:#4a90e2; --danger:#e2554a; --danger-bg:#3a1f1d;
    --success:#3bbf7a;
    --inner:#3bbf7a; --outer:#e0a93b; --branch:#9b7fe0;
  }
  body.light{
    --bg:#f4f5f7; --surface:#ffffff; --surface2:#e8eaed;
    --text:#1a1b1e; --muted:#5f6168; --hint:#9a9ba0;
    --line:#d8dade; --info:#2563eb; --danger:#dc2626; --danger-bg:#fef2f2;
    --success:#16a34a;
    --inner:#16a34a; --outer:#d97706; --branch:#7c3aed;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    padding:24px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-size:22px;font-weight:600;margin:0 0 16px}

  .tabs{display:flex;gap:8px;margin-bottom:8px}
  .tab{background:var(--surface);border:1px solid var(--line);color:var(--muted);
    font-size:14px;padding:9px 18px;border-radius:10px;cursor:pointer}
  .tab.active{background:var(--info);border-color:var(--info);color:#fff;font-weight:600}

  .statusbar{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);margin:14px 0 20px;flex-wrap:wrap}
  .right{margin-left:auto;display:flex;align-items:baseline;gap:10px}
  .clock{font-variant-numeric:tabular-nums}
  .refresh{font-size:12px;color:var(--hint)}
  @keyframes spin{to{transform:rotate(360deg)}}
  #btn-refresh.spinning svg{animation:spin .6s linear}
  button.mini{margin:0;font-size:12px;padding:4px 10px;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;cursor:pointer}
  button.mini:hover{background:var(--surface2)}

  .page{display:none}
  .page.active{display:block}

  /* 입고 알리미 */
  .daymode{font-size:13px;color:var(--muted);margin-bottom:14px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:720px){.cards{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .card.daerim{border:2px solid var(--danger)}
  .card.found{border-color:var(--info)}
  .card-head{display:flex;justify-content:space-between;align-items:baseline}
  .train-no{font-size:24px;font-weight:600}
  .stable-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;
    background:rgba(155,127,224,.18);color:#9b7fe0;margin-left:8px;vertical-align:middle}
  body.light .stable-badge{background:rgba(124,58,237,.12);color:#7c3aed}
  .sched{font-size:12px;color:var(--muted)}
  .loc{margin-top:12px;font-size:16px}
  .loc b{font-weight:600}
  .stt{font-size:13px;color:var(--muted)}
  .delay{margin-top:6px;font-size:13px}
  .delay.late{color:var(--danger)} .delay.early{color:var(--success)} .delay.ontime{color:var(--muted)}
  .wait{margin-top:12px;font-size:13px;color:var(--hint);line-height:1.5}
  .daerim-tag{margin-top:6px;font-size:13px;color:var(--danger)}

  /* 전체 현황 */
  .columns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
  @media(max-width:900px){.columns{grid-template-columns:1fr}}
  .col-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.inner{background:var(--inner)} .dot.outer{background:var(--outer)} .dot.branch{background:var(--branch)}
  .colcount{font-size:13px;color:var(--muted);font-weight:400;margin-left:auto}
  .train{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px}
  .train .no{font-size:17px;font-weight:600;min-width:52px}
  .train .tloc{flex:1;font-size:15px}
  .train .term{font-size:11px;color:var(--hint);margin-top:2px}
  .train.sindorim-term{border-color:#e2554a;background:rgba(226,85,74,.07)}
  .train.sindorim-term .term{color:#e2554a;font-weight:600}
  .badge{font-size:11px;padding:2px 8px;border-radius:6px;white-space:nowrap;font-weight:600}
  /* 진입 - 파랑 */
  .badge.s0{background:rgba(74,144,226,.15);color:#4a90e2}
  /* 도착 - 초록 */
  .badge.s1{background:rgba(59,191,122,.15);color:#3bbf7a}
  /* 출발 - 호박 */
  .badge.s2{background:rgba(224,169,59,.15);color:#e0a93b}
  /* 접근 - 보라 */
  .badge.s3{background:rgba(155,127,224,.15);color:#9b7fe0}
  body.light .badge.s0{background:rgba(37,99,235,.12);color:#2563eb}
  body.light .badge.s1{background:rgba(22,163,74,.12);color:#16a34a}
  body.light .badge.s2{background:rgba(217,119,6,.12);color:#d97706}
  body.light .badge.s3{background:rgba(124,58,237,.12);color:#7c3aed}
  .empty{font-size:13px;color:var(--hint);padding:20px 4px}

  .notice{margin-top:18px;font-size:12px;color:var(--hint);line-height:1.7}

  .alarm{display:none;position:fixed;inset:0;background:var(--danger-bg);
    align-items:center;justify-content:center;text-align:center;z-index:99;padding:24px}
  .alarm.show{display:flex}
  .alarm-train{font-size:64px;font-weight:700;color:var(--danger);margin-top:8px}
  .alarm-msg{font-size:26px;color:var(--danger);margin-top:4px}
  .alarm-sub{font-size:16px;color:var(--text);opacity:.8;margin-top:16px}
  .alarm button{margin-top:24px;background:transparent;border:1px solid var(--danger);
    color:var(--danger);font-size:16px;padding:10px 28px;border-radius:10px;cursor:pointer}
  .alarm button:hover{background:rgba(226,85,74,.12)}

  /* 열차 추적 */
  .track-input-row{display:flex;gap:8px;margin-bottom:20px}
  .track-input-row input{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--text);
    font-size:16px;padding:9px 14px;border-radius:10px;outline:none;max-width:240px}
  .track-input-row input:focus{border-color:var(--info)}
  .track-input-row button{background:var(--info);border:none;color:#fff;
    font-size:14px;font-weight:600;padding:9px 20px;border-radius:10px;cursor:pointer}
  .track-input-row button:hover{opacity:.85}
  .track-empty{font-size:14px;color:var(--hint);line-height:2;padding:20px 0}
  .track-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .tcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;position:relative}
  .tcard.found{border-color:var(--info)}
  .tcard.gone{opacity:.55}
  .tcard-no{font-size:22px;font-weight:600;margin-bottom:10px}
  .tcard-loc{font-size:15px;margin-bottom:4px}
  .tcard-loc b{font-weight:600}
  .tcard-stt{font-size:13px;color:var(--muted)}
  .tcard-dir{font-size:12px;color:var(--hint);margin-top:4px}
  .tcard-absent{font-size:13px;color:var(--hint);margin-top:8px;line-height:1.5}
  .tcard-del{position:absolute;top:12px;right:14px;background:transparent;border:none;
    color:var(--hint);font-size:18px;cursor:pointer;line-height:1;padding:0}
  .tcard-del:hover{color:var(--danger)}
  .track-toggle{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:12px;padding-top:12px;
    border-top:1px solid var(--line);font-size:13px;color:var(--muted)}
  .tsw{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
  .tsw input{opacity:0;width:0;height:0;position:absolute}
  .tsw-slider{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--line);
    border-radius:11px;cursor:pointer;transition:background .2s ease}
  .tsw-slider::before{content:"";position:absolute;width:16px;height:16px;left:2px;top:2px;
    background:#fff;border-radius:50%;transition:transform .2s ease;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .tsw input:checked + .tsw-slider{background:var(--info);border-color:var(--info)}
  .tsw input:checked + .tsw-slider::before{transform:translateX(18px)}
</style>
</head>
<body>
<div class="wrap">

  <div class="alarm" id="alarm">
    <div>
      <div style="font-size:80px;line-height:1">🔔</div>
      <div class="alarm-train" id="alarm-train">2446</div>
      <div class="alarm-msg" id="alarm-msg">대림역 도착</div>
      <div class="alarm-sub" id="alarm-sub"></div>
      <button id="alarm-dismiss">확인</button>
    </div>
  </div>

  <h1>신도림 2호선 열차 모니터</h1>

  <div class="tabs">
    <button class="tab active" id="tab-alimi">입고 알리미</button>
    <button class="tab" id="tab-all">전체 운행 현황</button>
    <button class="tab" id="tab-track">열차 추적</button>
  </div>

  <div class="statusbar">
    <span id="status">⏳ 연결 중…</span>
    <span class="src" id="src"></span>
    <button class="mini" id="btn-theme" style="font-size:15px;padding:3px 10px">🌙</button>
    <span class="right"><span class="clock" id="clock"></span><span class="refresh" id="refresh"></span><button class="mini" id="btn-refresh" title="지금 갱신" style="padding:3px 8px;margin-left:4px;line-height:1"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button></span>
  </div>

  <!-- 페이지 1: 입고 알리미 -->
  <div class="page active" id="page-alimi">
    <div class="daymode" id="daymode"></div>
    <div class="cards" id="cards"></div>
    <div class="notice" id="notice-alimi"></div>
  </div>

  <!-- 페이지 2: 전체 현황 -->
  <div class="page" id="page-all">
    <div class="columns">
      <div>
        <div class="col-head"><span class="dot inner"></span> 내선 <span class="colcount" id="cnt-inner"></span></div>
        <div id="list-inner"></div>
      </div>
      <div>
        <div class="col-head"><span class="dot outer"></span> 외선 <span class="colcount" id="cnt-outer"></span></div>
        <div id="list-outer"></div>
      </div>
      <div>
        <div class="col-head"><span class="dot branch"></span> 지선 <span class="colcount" id="cnt-branch"></span></div>
        <div id="list-branch"></div>
      </div>
    </div>
    <div class="notice" id="notice-all"></div>
  </div>

  <!-- 페이지 3: 열차 추적 -->
  <div class="page" id="page-track">
    <div class="track-input-row">
      <input id="track-input" type="text" inputmode="numeric" maxlength="6" placeholder="열차번호 입력 (예: 2446)">
      <button id="track-add">추가</button>
    </div>
    <div id="track-empty" class="track-empty">추적할 열차번호를 추가하세요.<br>추가된 열차는 30초마다 자동 갱신됩니다.</div>
    <div id="track-cards" class="track-cards"></div>
  </div>

</div>

<script>
(function(){
  // ⚠️ 아래 주소를 본인 Cloudflare Worker 주소로 바꾸세요.
  //    예: https://sindorim-train.본인계정.workers.dev
  var WORKER_URL="https://sindorim-train.kimkim3764.workers.dev";

  var SCHED_WEEKDAY={"2446":"21:22","2516":"25:00"};
  var SCHED_WEEKEND={"2376":"21:01","2388":"21:36","2398":"22:04","2408":"22:35","2412":"22:48","2418":"23:09","2424":"23:30","2428":"23:44","2432":"24:00"};
  // 주박열차 (차량기지에 밤새 머무는 열차)
  var STABLE_TRAINS={"2516":1,"2432":1};
  var STATUS={"0":"진입","1":"도착","2":"출발","3":"접근"};
  var DETECTED=false, FIRED={}, WORKING_EP=null, LAST_POLL=0;
  var LATEST=[]; // 최근 응답 (탭 전환 시 즉시 재렌더용)

  // ===== 공휴일 =====
  var HOLIDAYS={
    "2026-01-01":1,"2026-02-16":1,"2026-02-17":1,"2026-02-18":1,
    "2026-03-02":1,"2026-05-05":1,"2026-05-25":1,"2026-06-03":1,
    "2026-07-17":1,"2026-08-17":1,"2026-09-24":1,"2026-09-25":1,
    "2026-10-05":1,"2026-10-09":1,"2026-12-25":1,
    "2027-01-01":1,"2027-02-08":1,"2027-02-09":1,"2027-02-10":1,
    "2027-03-01":1,"2027-05-05":1,"2027-05-13":1,"2027-07-19":1,
    "2027-08-16":1,"2027-09-14":1,"2027-09-15":1,"2027-09-16":1,
    "2027-10-04":1,"2027-10-11":1,"2027-12-27":1
  };
  function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  // 운행일 기준 날짜: 새벽 1시 이전은 전날로 취급 (지하철은 다음날 새벽 1시까지 운행)
  function serviceDate(){
    var d=new Date();
    if(d.getHours()<1){d=new Date(d.getTime()-2*60*60*1000);} // 1시 이전이면 2시간 빼서 확실히 전날로
    return d;
  }
  function isHoliday(d){var x=d.getDay();if(x===0||x===6)return true;return !!HOLIDAYS[ymd(d)];}
  function schedule(){return isHoliday(serviceDate())?SCHED_WEEKEND:SCHED_WEEKDAY;}
  function schedMin(h){var p=h.split(":");return parseInt(p[0],10)*60+parseInt(p[1],10);}
  function delayMin(hhmm){
    var s=schedMin(hhmm);if(s>=1440)s-=1440;
    var n=new Date();return n.getHours()*60+n.getMinutes()-s;
  }

  // ===== 본선 역 순서 (신도림 기준 정렬) =====
  var LOOP=["시청","을지로입구","을지로3가","을지로4가","동대문역사문화공원","신당","상왕십리","왕십리","한양대","뚝섬","성수","건대입구","구의","강변","잠실나루","잠실","신천","종합운동장","삼성","선릉","역삼","강남","교대","서초","방배","사당","낙성대","서울대입구","봉천","신림","신대방","구로디지털단지","대림","신도림","문래","영등포구청","당산","합정","홍대입구","신촌","이대","아현","충정로"];
  var NLOOP=LOOP.length, SIDX=LOOP.indexOf("신도림");
  function loopPos(name){var n=name||"";var p=LOOP.indexOf(n);if(p>=0)return p;for(var i=0;i<NLOOP;i++){if(n.indexOf(LOOP[i])>=0)return i;}return -1;}
  function distInner(name){var p=loopPos(name);if(p<0)return 999;return (SIDX-p+NLOOP)%NLOOP;}
  function distOuter(name){var p=loopPos(name);if(p<0)return 999;return (p-SIDX+NLOOP)%NLOOP;}

  // ===== 지선 판별 =====
  var BRANCH_STATIONS=["용답","신답","용두","도림천","양천구청"];
  var BRANCH_TNM=["지선","신설동","까치산"];
  function isBranch(t){
    if(BRANCH_STATIONS.indexOf(t.statnNm)>=0)return true;
    var tnm=t.statnTnm||"";
    for(var i=0;i<BRANCH_TNM.length;i++){if(tnm.indexOf(BRANCH_TNM[i])>=0)return true;}
    return false;
  }

  function pad(n){return n<10?"0"+n:""+n;}
  function fmtClock(d){return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());}

  // 열차번호 뒤 2자리 매칭 (시간표 번호와 실시간 번호 앞자리가 다를 수 있음)
  // 예: 시간표 2290 ↔ 실시간 4290 → 뒤 2자리 "90" 일치
  function tail2(no){return String(no).slice(-3);}
  function matchSched(trainNo, sched){
    // 정확히 일치하면 그게 우선
    if(sched[trainNo]) return trainNo;
    // 뒤 3자리로 매칭
    var t2=tail2(trainNo);
    var keys=Object.keys(sched);
    for(var i=0;i<keys.length;i++){
      if(tail2(keys[i])===t2) return keys[i];
    }
    return null;
  }

  // ===== 렌더: 입고 알리미 =====
  function renderAlimi(list, err){
    var sched=schedule(),weekend=isHoliday(serviceDate());
    var schedCount=Object.keys(sched).length;
    document.getElementById("daymode").textContent=weekend?"토·일·공휴일 모드 · 대상 "+schedCount+"대":"평일 모드 · 대상 "+schedCount+"대";
    var map={};  // 시간표 번호 → 실시간 데이터
    list.forEach(function(t){
      if(t.updnLine!=="0") return;
      var matched=matchSched(t.trainNo, sched);
      if(matched){map[matched]=t;DETECTED=true;}
    });
    var nums=Object.keys(sched),html="";
    nums.forEach(function(no){
      var info=map[no],st=sched[no],found=!!info;
      var daerim=found&&info.statnNm.indexOf("대림")>=0;
      var isStable=!!STABLE_TRAINS[no];
      var cls="card"+(daerim?" daerim":(found?" found":""));
      var stableBadge=isStable?' <span class="stable-badge">주박</span>':'';
      html+='<div class="'+cls+'"><div class="card-head"><span class="train-no">'+no+stableBadge+'</span><span class="sched">시간표 '+st+'</span></div>';
      if(found){
        var dl=delayMin(st),dt,dc;
        if(dl>0){dt="+"+dl+"분 지연";dc="late";}else{dt="";dc="";}
        // 신도림역까지 남은 역 수 계산 (내선 기준)
        var curPos=loopPos(info.statnNm);
        var distToSindorim=curPos>=0?(SIDX-curPos+NLOOP)%NLOOP:null;
        html+='<div class="loc"><b>'+info.statnNm+'</b> <span class="badge s'+info.trainSttus+'" style="font-size:11px;margin-left:6px">'+(STATUS[info.trainSttus]||"-")+'</span></div>';
        if(distToSindorim!==null&&distToSindorim>0){
          html+='<div style="font-size:12px;color:var(--muted);margin-top:4px">신도림역까지 '+distToSindorim+'역</div>';
        } else if(distToSindorim===0){
          html+='<div style="font-size:12px;color:var(--danger);margin-top:4px">신도림역 도착</div>';
        }
        if(dt)html+='<div class="delay '+dc+'">'+dt+'</div>';
        if(daerim)html+='<div class="daerim-tag">🔔 대림역</div>';
      }else{
        html+='<div class="wait">운행 목록에 없음</div>';
      }
      html+='</div>';
    });
    document.getElementById("cards").innerHTML=html;
    var n="";
    if(err){n="연결 오류: "+err;}
    document.getElementById("notice-alimi").textContent=n;
    // 대림역 알람 체크
    nums.forEach(function(no){
      var info=map[no];
      if(info&&info.statnNm.indexOf("대림")>=0&&!FIRED[no]){FIRED[no]=true;showAlarm(no,info);}
    });
  }

  // ===== 렌더: 전체 현황 =====
  function trainRow(t,dist){
    var s=t.trainSttus||"",loc=t.statnNm||"",term=t.statnTnm||"";
    var dl="";
    if(typeof dist==="number"&&dist<999){dl=dist===0?"신도림":"신도림까지 "+dist+"역";}
    var isSindorim=term.indexOf("신도림")>=0;
    var html='<div class="train'+(isSindorim?" sindorim-term":"")+'"><span class="no">'+t.trainNo+'</span>';
    html+='<span class="tloc">'+loc+'<div class="term">'+(dl?dl+" · ":"")+term+' 방면</div></span>';
    html+='<span class="badge s'+s+'">'+(STATUS[s]||"-")+'</span></div>';
    return html;
  }
  function renderAll(list){
    var inner=[],outer=[],branch=[];
    list.forEach(function(t){
      if(isBranch(t)){branch.push(t);return;}
      if(t.updnLine==="0")inner.push(t);else outer.push(t);
    });
    inner.sort(function(a,b){return distInner(a.statnNm)-distInner(b.statnNm);});
    outer.sort(function(a,b){return distOuter(a.statnNm)-distOuter(b.statnNm);});
    branch.sort(function(a,b){return (a.statnNm||"").localeCompare(b.statnNm||"","ko");});
    document.getElementById("list-inner").innerHTML=inner.length?inner.map(function(t){return trainRow(t,distInner(t.statnNm));}).join(""):'<div class="empty">내선 열차 없음</div>';
    document.getElementById("list-outer").innerHTML=outer.length?outer.map(function(t){return trainRow(t,distOuter(t.statnNm));}).join(""):'<div class="empty">외선 열차 없음</div>';
    document.getElementById("list-branch").innerHTML=branch.length?branch.map(function(t){return trainRow(t,null);}).join(""):'<div class="empty">지선 열차 없음</div>';
    document.getElementById("cnt-inner").textContent=inner.length+"대";
    document.getElementById("cnt-outer").textContent=outer.length+"대";
    document.getElementById("cnt-branch").textContent=branch.length+"대";
    document.getElementById("notice-all").textContent="전체 "+list.length+"대 · 내선 "+inner.length+" / 외선 "+outer.length+" / 지선 "+branch.length+" · 신도림 가까운 순";
  }

  function renderBoth(list,err){LATEST=list;renderAlimi(list,err);renderAll(list);renderTrack(list);}

  // ===== 알람 =====
  function showAlarm(no,info){
    document.getElementById("alarm-train").textContent=no;
    document.getElementById("alarm-msg").textContent=info.statnNm+" 도착";
    document.getElementById("alarm-sub").textContent="현재: "+info.statnNm+" "+(STATUS[info.trainSttus]||"")+" · 시간표 "+(schedule()[no]||"");
    document.getElementById("alarm").classList.add("show");
  }
  document.getElementById("alarm-dismiss").addEventListener("click",function(){document.getElementById("alarm").classList.remove("show");});

  // ===== 열차 추적 =====
  // 각 항목: {no:"2446", alert:true}  (alert=신도림 도착 알림 on/off)
  var TRACK_LIST=[];
  var TRACK_FIRED={};  // 알림 중복 방지
  (function(){
    var saved=localStorage.getItem("trackList");
    if(saved){
      try{
        var parsed=JSON.parse(saved);
        // 구버전(문자열 배열) 호환
        TRACK_LIST=parsed.map(function(x){
          return (typeof x==="string")?{no:x,alert:false}:x;
        });
      }catch(e){TRACK_LIST=[];}
    }
  })();
  function saveTrack(){localStorage.setItem("trackList",JSON.stringify(TRACK_LIST));}

  function renderTrack(list){
    var empty=document.getElementById("track-empty");
    var cards=document.getElementById("track-cards");
    if(TRACK_LIST.length===0){empty.style.display="block";cards.innerHTML="";return;}
    empty.style.display="none";
    var map={};
    (list||[]).forEach(function(t){
      map[t.trainNo]=t;
      map[tail2(t.trainNo)]=t;
    });
    var html="";
    TRACK_LIST.forEach(function(item){
      var no=item.no;
      var t=map[no]||map[tail2(no)];
      var found=!!t;
      var updn=found?(t.updnLine==="0"?"내선":"외선"):"";
      var term=found?(t.statnTnm||""):"";
      var cls="tcard"+(found?" found":" gone");
      // 신도림까지 남은 역
      var distLabel="";
      if(found){
        var p=loopPos(t.statnNm);
        if(p>=0){var d=(SIDX-p+NLOOP)%NLOOP; distLabel=d===0?"신도림 도착":"신도림까지 "+d+"역";}
      }
      html+='<div class="'+cls+'">';
      html+='<button class="tcard-del" data-no="'+no+'">×</button>';
      html+='<div class="tcard-no">'+no+'</div>';
      if(found){
        html+='<div class="tcard-loc"><b>'+t.statnNm+'</b> <span class="badge s'+t.trainSttus+'" style="font-size:11px;margin-left:6px">'+(STATUS[t.trainSttus]||"-")+'</span></div>';
        if(distLabel)html+='<div class="tcard-dir">'+distLabel+'</div>';
        html+='<div class="tcard-dir">'+updn+(term?" · "+term+" 방면":"")+'</div>';
      }else{
        html+='<div class="tcard-absent">현재 운행 목록에 없음</div>';
      }
      // 신도림 도착 알림 토글
      html+='<label class="track-toggle"><span>전역 도착 알림</span><span class="tsw"><input type="checkbox" class="track-alert" data-no="'+no+'"'+(item.alert?" checked":"")+'><span class="tsw-slider"></span></span></label>';
      html+='</div>';
    });
    cards.innerHTML=html;
    // 삭제 버튼
    cards.querySelectorAll(".tcard-del").forEach(function(btn){
      btn.addEventListener("click",function(){
        var no=this.getAttribute("data-no");
        TRACK_LIST=TRACK_LIST.filter(function(it){return it.no!==no;});
        saveTrack();renderTrack(LATEST);
      });
    });
    // 알림 토글
    cards.querySelectorAll(".track-alert").forEach(function(cb){
      cb.addEventListener("change",function(){
        var no=this.getAttribute("data-no");
        TRACK_LIST.forEach(function(it){if(it.no===no)it.alert=cb.checked;});
        saveTrack();
      });
    });
    // 전역 도착 알림 체크 (내선=대림, 외선=문래)
    TRACK_LIST.forEach(function(item){
      if(!item.alert) return;
      var t=map[item.no]||map[tail2(item.no)];
      if(!t){return;}
      var prevStation=(t.updnLine==="0")?"대림":"문래";  // 내선 전역=대림, 외선 전역=문래
      if(t.statnNm.indexOf(prevStation)>=0 && !TRACK_FIRED[item.no]){
        TRACK_FIRED[item.no]=true;
        showAlarm(item.no, t);
      }
      // 전역을 벗어나면 다시 알림 가능하게 리셋
      if(t.statnNm.indexOf(prevStation)<0){TRACK_FIRED[item.no]=false;}
    });
  }

  // 추가 버튼
  document.getElementById("track-add").addEventListener("click",function(){
    var val=document.getElementById("track-input").value.trim();
    if(!val){return;}
    if(TRACK_LIST.some(function(it){return it.no===val;})){document.getElementById("track-input").value="";return;}
    TRACK_LIST.push({no:val,alert:false});saveTrack();
    document.getElementById("track-input").value="";
    renderTrack(LATEST);
  });
  document.getElementById("track-input").addEventListener("keydown",function(e){
    if(e.key==="Enter") document.getElementById("track-add").click();
  });

  // ===== 탭 전환 =====
  function switchTab(which){
    ["alimi","all","track"].forEach(function(w){
      document.getElementById("tab-"+w).classList.toggle("active",which===w);
      document.getElementById("page-"+w).classList.toggle("active",which===w);
    });
  }
  document.getElementById("tab-alimi").addEventListener("click",function(){switchTab("alimi");});
  document.getElementById("tab-all").addEventListener("click",function(){switchTab("all");});
  document.getElementById("tab-track").addEventListener("click",function(){switchTab("track");});

  // ===== 시계/갱신 =====
  function tick(){
    document.getElementById("clock").textContent=fmtClock(new Date());
    var el=document.getElementById("refresh");
    if(LAST_POLL===0){el.textContent="갱신 대기";}
    else{var left=30-Math.floor((Date.now()-LAST_POLL)/1000);if(left<0)left=0;el.textContent="다음 갱신 "+left+"초";}
  }

  // ===== 폴링 =====
  function poll(){
    var st=document.getElementById("status");
    fetch(WORKER_URL).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
      .then(function(d){
        LAST_POLL=Date.now();
        var list=(d&&d.realtimePositionList)||[];
        st.innerHTML='✅ 실시간 연결됨 · 전체 '+list.length+'대';
        document.getElementById("src").textContent="";
        renderBoth(list,null);
      }).catch(function(e){
        st.innerHTML='⚠️ 일시적 오류 · 자동 재시도 중';
        document.getElementById("src").textContent="";
        renderBoth([],e.message||"네트워크 오류");
      });
  }

  // ===== 수동 새로고침 =====
  document.getElementById("btn-refresh").addEventListener("click",function(){
    var btn=this;
    btn.classList.add("spinning");
    btn.style.pointerEvents="none";
    poll();
    setTimeout(function(){btn.classList.remove("spinning");btn.style.pointerEvents="";},2000);
  });

  // ===== 다크/라이트 모드 =====
  (function(){
    var btn=document.getElementById("btn-theme");
    var saved=localStorage.getItem("theme");
    if(saved==="light"){document.body.classList.add("light");btn.textContent="☀️";}
    btn.addEventListener("click",function(){
      var isLight=document.body.classList.toggle("light");
      btn.textContent=isLight?"☀️":"🌙";
      localStorage.setItem("theme",isLight?"light":"dark");
    });
  })();

  tick();setInterval(tick,1000);
  poll();setInterval(poll,90000);
})();
</script>
</body>
</html>
